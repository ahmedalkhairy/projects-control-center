<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control Center — Operations Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        background: #0f172a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 9999;
        font-family: Inter, system-ui, sans-serif;
        transition: opacity 0.3s ease;
      }
      #app-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .loader-icon {
        width: 52px;
        height: 52px;
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        box-shadow: 0 0 32px rgba(59,130,246,0.35);
      }
      .loader-title {
        color: #f1f5f9;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .loader-subtitle {
        color: #475569;
        font-size: 12px;
        margin-top: -14px;
      }
      .loader-spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid #1e293b;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-top: 4px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Splash loader — visible immediately, removed once React mounts -->
    <div id="app-loader">
      <div class="loader-icon">⚡</div>
      <div class="loader-title">Control Center</div>
      <div class="loader-subtitle">Operations Dashboard</div>
      <div class="loader-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
