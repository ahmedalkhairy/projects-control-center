name: Build Installer

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── On tag push: pre-create the GitHub Release so electron-builder can upload to it ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── On tag push: build + publish to GitHub Releases (includes latest.yml for OTA) ──
      - name: Build & Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run build:electron:publish
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          WIN_CSC_LINK: ''
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── On branch push / manual trigger: build only (artifact upload) ─────────
      - name: Build (no publish)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm run build:electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          WIN_CSC_LINK: ''
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Control-Center-Setup-Windows
          path: release/*.exe
          retention-days: 30
